services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: pokemon_db
    ports:
      - "5432:5432"

  web:
    build: .
    ports:
      - "1532:1532"
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/pokemon_db
    depends_on:
      - db